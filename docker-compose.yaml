services:
  demo:
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4318
      - OTEL_SERVICE_NAME=demo-spring-app
      - OTEL_LOGS_EXPORTER=none
      - OTEL_METRICS_EXPORTER=none
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_PROPAGATION_PROVIDERS=w3c,b3
    build:
      context: ./demo
      dockerfile: Dockerfile
    container_name: demo
    ports:
      - "8080:8080"
    networks:
      - url_shot_java
    depends_on:
      - tidb-server
      - redpanda
      - dragonfly
      - tempo
      - alloy
    volumes:
      - ./demo/logs:/var/log/spring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: grafana

    ports:
        - "3000:3000"

    volumes:
        - ./grafana/provisioning:/etc/grafana/provisioning

    extra_hosts:
        - "host.docker.internal:host-gateway"

    environment:
        GF_SECURITY_ADMIN_USER: admin
        GF_SECURITY_ADMIN_PASSWORD: admin

        GF_AUTH_ANONYMOUS_ENABLED: true
        GF_AUTH_ANONYMOUS_ORG_ROLE: Admin

        GF_DATABASE_TYPE: postgres
        GF_DATABASE_HOST: host.docker.internal:5432
        GF_DATABASE_NAME: grafana
        GF_DATABASE_USER: grafana
        GF_DATABASE_PASSWORD: grafana123

    networks:
        - url_shot_java

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - url_shot_java

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - url_shot_java

  tempo:
    image: grafana/tempo:2.8.2
    container_name: tempo
    command:
      - -config.file=/etc/tempo.yaml
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"
      - "4319:4318"
    networks:
      - url_shot_java

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
      - ./demo/logs:/var/log/spring
    command:
      - run
      - /etc/alloy/config.alloy
    networks:
      - url_shot_java

  pd:
    image: pingcap/pd:latest
    container_name: pd-url-spring
    restart: unless-stopped
    command:
      - --name=pd1
      - --client-urls=http://0.0.0.0:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-client-urls=http://pd:2379
      - --advertise-peer-urls=http://pd:2380
      - --initial-cluster=pd1=http://pd:2380
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - pd_data:/data
    networks:
      - url_shot_java
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2379/pd/api/v1/members"]
      interval: 10s
      timeout: 5s
      retries: 10

  tikv:
    image: pingcap/tikv:latest
    container_name: tikv-url-spring
    restart: unless-stopped
    command:
      - --pd=pd:2379
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv:20160
      - --metrics-addr=0.0.0.0:20180
    ports:
      - "20160:20160"
      - "20180:20180"
    depends_on:
      pd:
        condition: service_healthy
    volumes:
      - tikv_data:/data
    networks:
      - url_shot_java

  tidb-server:
    image: pingcap/tidb:latest
    container_name: tidb-server-url-spring
    restart: unless-stopped
    command:
      - --store=tikv
      - --path=pd:2379
      - --status=10080
    ports:
      - "4000:4000"
      - "10080:10080"
    depends_on:
      tikv:
        condition: service_started
    networks:
      - url_shot_java
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "4000"]
      interval: 10s
      timeout: 5s
      retries: 10

  ticdc:
    image: pingcap/ticdc:latest
    container_name: ticdc-url-spring
    restart: unless-stopped
    entrypoint:
      - /cdc
      - server
      - --pd=http://pd:2379
      - --addr=0.0.0.0:8300
      - --advertise-addr=ticdc:8300
    ports:
      - "8300:8300"
    depends_on:
      pd:
        condition: service_healthy
    networks:
      - url_shot_java

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.2
    container_name: redpanda-url-spring
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
      - --pandaproxy-addr=0.0.0.0:8082
      - --advertise-pandaproxy-addr=PLAINTEXT://redpanda:8082
    environment:
      REDPANDA_AUTO_CREATE_TOPICS_ENABLED: "true"
    ports:
      - "9092:9092"
      - "8082:8082"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - url_shot_java
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9644/v1/status/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    container_name: dragonfly-url-spring
    restart: unless-stopped
    command: ["dragonfly", "--logtostderr", "--dir", "/data"]
    ulimits:
      memlock: -1
    ports:
      - "6379:6379"
    volumes:
      - dragonfly_data:/data
    networks:
      - url_shot_java
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongodb:
    image: percona/percona-server-mongodb:latest
    container_name: mongodb-url-spring
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - url_shot_java
    healthcheck:
      test: ["CMD", "mongosh", "--username", "root", "--password", "root", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 10s
      retries: 10

networks:
  url_shot_java:
    driver: bridge

volumes:
  pd_data:
  tikv_data:
  redpanda_data:
  dragonfly_data:
  mongodb_data:
