services:
  demo:
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4318
      - OTEL_SERVICE_NAME=demo-spring-app
      - OTEL_LOGS_EXPORTER=none
      - OTEL_METRICS_EXPORTER=none
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_PROPAGATION_PROVIDERS=w3c,b3
    build:
      context: ./demo
      dockerfile: Dockerfile
    container_name: demo
    ports:
      - "8080:8080"
    networks:
      - url_shot_java
    depends_on:
      tidb-server:
        condition: service_started
      redpanda:
        condition: service_started
      dragonfly:
        condition: service_started
      tempo:
        condition: service_started
      alloy:
        condition: service_started
      ticdc-setup:
        condition: service_completed_successfully
    volumes:
      - ./demo/logs:/var/log/spring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      tidb-server:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    networks:
      - url_shot_java

  prometheus:
    image: victoriametrics/victoria-metrics:latest
    container_name: prometheus
    command:
        - --promscrape.config=/etc/prometheus/prometheus.yml
        - --storageDataPath=/victoria-metrics-data
        - --retentionPeriod=30d
        - --httpListenAddr=:9090
    depends_on:
        mongodb-exporter:
            condition: service_started
        demo:
            condition: service_started
        kafka-exporter:
            condition: service_started
        tikv:
            condition: service_started
    volumes:
        - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
        - victoria_data:/victoria-metrics-data
    ports:
        - "9090:8428"
    networks:
        - url_shot_java

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - url_shot_java

  tempo:
    image: grafana/tempo:2.8.2
    container_name: tempo
    command:
      - -config.file=/etc/tempo.yaml
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo.yaml
    ports:
      - "3200:3200"
      - "4319:4318"
    networks:
      - url_shot_java

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy
      - ./demo/logs:/var/log/spring
    command:
      - run
      - /etc/alloy/config.alloy
    networks:
      - url_shot_java

  pd:
    image: pingcap/pd:latest
    container_name: pd-url-spring
    restart: unless-stopped
    command:
      - --name=pd1
      - --client-urls=http://0.0.0.0:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-client-urls=http://pd:2379
      - --advertise-peer-urls=http://pd:2380
      - --initial-cluster=pd1=http://pd:2380
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - pd_data:/data
    networks:
      - url_shot_java

  tikv:
    image: pingcap/tikv:latest
    container_name: tikv-url-spring
    restart: unless-stopped
    volumes:
      - tikv_data:/data
    command:
      - --pd=pd:2379
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv:20160
      - --status-addr=0.0.0.0:20180
      - --data-dir=/data
    ports:
      - "20180:20180"
    depends_on:
      pd:
        condition: service_started
    networks:
      - url_shot_java

  tidb-server:
    image: pingcap/tidb:latest
    container_name: tidb-server-url-spring
    restart: unless-stopped
    command:
      - --store=tikv
      - --path=pd:2379
      - --status=10080
      - --token-limit=1000
    ports:
        - "4000:4000"
        - "10080:10080"
    depends_on:
      pd:
        condition: service_started
      tikv:
        condition: service_started
    networks:
      - url_shot_java
    healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:10080/status"]
        interval: 10s
        timeout: 5s
        retries: 20

  ticdc:
    image: pingcap/ticdc:latest
    container_name: ticdc-url-spring
    restart: unless-stopped
    entrypoint:
      - /cdc
      - server
      - --pd=http://pd:2379
      - --addr=0.0.0.0:8300
      - --advertise-addr=ticdc:8300
    ports:
      - "8300:8300"
    depends_on:
      pd:
        condition: service_started
    networks:
      - url_shot_java

  ticdc-setup:
    image: pingcap/ticdc:latest
    container_name: ticdc-setup-automation
    entrypoint: /bin/sh
    command:
      - /usr/local/bin/changefeed-setup.sh
    volumes:
      - ./tidb/changefeed-setup.sh:/usr/local/bin/changefeed-setup.sh
    depends_on:
      ticdc:
        condition: service_started
      redpanda:
        condition: service_started
    networks:
      - url_shot_java

  tidb-init:
    image: mysql:8
    container_name: tidb-init
    depends_on:
      tidb-server:
        condition: service_started
    volumes:
      - ./tidb/init:/scripts
    entrypoint: ["/bin/sh", "/scripts/init-db.sh"]
    networks:
      - url_shot_java

  redpanda:
    image: apache/kafka:4.3.0
    container_name: redpanda-url-spring
    hostname: redpanda
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@redpanda:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://redpanda:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1
    networks:
      - url_shot_java
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/9092"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  kafka-exporter:
    image: redpandadata/kminion:latest
    container_name: kafka-exporter
    ports:
        - "9308:8080"
    environment:
        KAFKA_BROKERS: redpanda:9092
        KMINION_EXPORTER_ENABLED: "true"
        KMINION_KAFKA_VERSION: "4.3.0"
        KMINION_CONSUMERGROUPS_ENABLED: "true"
        KMINION_TOPICS_GRANULARITY: per_topic
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
        - url_shot_java

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped

    privileged: true

    ports:
        - "8085:8080"
    volumes:
        - /:/rootfs:ro
        - /var/run:/var/run:ro
        - /sys:/sys:ro
        - /var/lib/docker:/var/lib/docker:ro
        - /dev/disk:/dev/disk:ro
    devices:
        - /dev/kmsg

    networks:
        - url_shot_java

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    ports:
        - "9100:9100"
    command:
        - '--path.rootfs=/host'
    volumes:
        - '/:/host:ro,rslave'
    networks:
        - url_shot_java

  akhq:
    image: tchiotludo/akhq:latest
    container_name: akhq-url-spring
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      AKHQ_CONFIGURATION: |
        akhq:
          connections:
            docker-kafka:
              properties:
                bootstrap.servers: "redpanda:9092"
    depends_on:
      redpanda:
        condition: service_started
    networks:
      - url_shot_java

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    container_name: dragonfly-url-spring
    restart: unless-stopped
    command: ["dragonfly", "--logtostderr", "--dir", "/data"]
    ulimits:
      memlock: -1
    ports:
      - "6379:6379"
    volumes:
      - dragonfly_data:/data
    networks:
      - url_shot_java

  redis-exporter:
    image: oliver006/redis_exporter
    environment:
        REDIS_ADDR: redis://dragonfly:6379
    ports:
        - "9121:9121"
    networks:
        - url_shot_java

  mongodb:
    image: percona/percona-server-mongodb:latest
    container_name: mongodb-url-spring
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - url_shot_java

  mongodb-exporter:
    image: percona/mongodb_exporter:0.51.0
    command:
        - --mongodb.uri=mongodb://root:root@mongodb:27017/admin
    ports:
      - "9216:9216"
    networks:
        - url_shot_java
    depends_on:
      mongodb:
        condition: service_started

networks:
  url_shot_java:
    driver: bridge

volumes:
  pd_data:
  tikv_data:
  redpanda_data:
  dragonfly_data:
  mongodb_data:
  victoria_data:
