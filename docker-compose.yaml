services:
  demo:
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://alloy:4318
      - OTEL_SERVICE_NAME=demo-spring-app
      - OTEL_LOGS_EXPORTER=none
      - OTEL_METRICS_EXPORTER=none
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_PROPAGATION_PROVIDERS=w3c,b3
    build:
      context: ./demo
      dockerfile: Dockerfile
    container_name: demo
    ports:
      - "8080:8080"
    networks:
      - url_shot_java
    depends_on:
      - tidb-server
      - redpanda
      - dragonfly
      - tempo
      - alloy
    volumes:
      - ./demo/logs:/var/log/spring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    networks:
      - url_shot_java

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
        - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
        - "9090:9090"
    networks:
        - url_shot_java

  loki:
    image: grafana/loki:3.0.0
    container_name: loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - url_shot_java

  tempo:
    image: grafana/tempo:2.8.2
    container_name: tempo
    command:
        - -config.file=/etc/tempo.yaml
    volumes:
        - ./tempo/tempo.yaml:/etc/tempo.yaml
    ports:
        - "3200:3200"
        - "4319:4318"
    networks:
        - url_shot_java

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    ports:
        - "4317:4317"
        - "4318:4318"
    volumes:
        - ./alloy/config.alloy:/etc/alloy/config.alloy
        - ./demo/logs:/var/log/spring
    command:
        - run
        - /etc/alloy/config.alloy
    networks:
        - url_shot_java

  pd:
    image: pingcap/pd:latest
    container_name: pd-url-spring
    restart: unless-stopped
    command:
      - --name=pd1
      - --client-urls=http://0.0.0.0:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-client-urls=http://pd:2379
      - --advertise-peer-urls=http://pd:2380
      - --initial-cluster=pd1=http://pd:2380
    ports:
      - "2379:2379"
      - "2380:2380"
    volumes:
      - pd_data:/data
    networks:
      - url_shot_java
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2379/pd/api/v1/members"]
      interval: 10s
      timeout: 5s
      retries: 10

  tikv:
    image: pingcap/tikv:latest
    container_name: tikv-url-spring
    restart: unless-stopped
    command:
      - --pd=pd:2379
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv:20160
    ports:
      - "20160:20160"
    depends_on:
      pd:
        condition: service_healthy
    volumes:
      - tikv_data:/data
    networks:
      - url_shot_java

  tidb-server:
    image: pingcap/tidb:latest
    container_name: tidb-server-url-spring
    restart: unless-stopped
    command:
      - --store=tikv
      - --path=pd:2379
    ports:
      - "4000:4000"
    depends_on:
      tikv:
        condition: service_started
    networks:
      - url_shot_java
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "4000"]
      interval: 10s
      timeout: 5s
      retries: 10

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v25.1.2
    container_name: redpanda-url-spring
    restart: unless-stopped
    command:
        - redpanda
        - start
        - --overprovisioned
        - --smp=1
        - --memory=1G
        - --reserve-memory=0M
        - --node-id=0
        - --check=false
        - --kafka-addr=PLAINTEXT://0.0.0.0:9092
        - --advertise-kafka-addr=PLAINTEXT://localhost:9092
        - --pandaproxy-addr=0.0.0.0:8082
        - --advertise-pandaproxy-addr=PLAINTEXT://localhost:8082
    ports:
      - "9092:9092"
      - "8082:8082"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - url_shot_java
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9644/v1/status/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly
    container_name: dragonfly-url-spring
    restart: unless-stopped
    command: ["dragonfly", "--logtostderr", "--dir", "/data"]
    ulimits:
      memlock: -1
    ports:
      - "6379:6379"
    volumes:
      - dragonfly_data:/data
    networks:
      - url_shot_java
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui-url-spring
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: redpanda
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: redpanda:9092
    depends_on:
      - redpanda
    networks:
      - url_shot_java

  opensearch:
    image: opensearchproject/opensearch:3.1.0
    container_name: opensearch-url-spring
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - url_shot_java
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.1.0
    container_name: opensearch-dashboards-url-spring
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
    ports:
      - "5601:5601"
    depends_on:
      - opensearch
    networks:
      - url_shot_java

networks:
  url_shot_java:
    driver: bridge

volumes:
  pd_data:
  tikv_data:
  redpanda_data:
  dragonfly_data:
  opensearch_data:
